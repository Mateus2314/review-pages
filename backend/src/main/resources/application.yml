server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/reviewpages
    username: reviewpages
    password: reviewpages123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
