    secret: "d2ViLXNpdGUtcmV2aWV3LXBhZ2VzLWp3dC1zZWNyZXQta2V5LWZvci1hdXRoZW50aWNhdGlvbi0yMDI0"
    expiration-ms: 86400000

springdoc:
