version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: reviewpages-db
    environment:
      POSTGRES_DB: reviewpages
      POSTGRES_USER: reviewpages
      POSTGRES_PASSWORD: reviewpages123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
